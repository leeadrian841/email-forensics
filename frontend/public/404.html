<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA redirect trick.
        // When GitHub Pages gets a 404, it serves this page instead.
        // We save the original path and redirect to index.html, which
        // restores the path so React Router can handle it.
        sessionStorage.setItem('spa-redirect', window.location.pathname + window.location.search);
        window.location.replace('/email-forensics/');
    </script>
</head>
<body>
    Redirecting&hellip;
</body>
</html>

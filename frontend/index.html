<!--
  index.html — HTML shell for the portfolio.
  To edit: change the <title> and <meta description> below.
  Images placed in public/ are served at the site root (e.g. /images/photo.png).
-->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#060b14" />
        <meta name="description" content="Email Forensics Portfolio — Dissecting deception, one email header at a time. By Adrian Lee." />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <title>EmailForensics.sh — Adrian Lee</title>
        <style>
            #emergent-badge,
            a[href*="emergent.sh"],
            a[id*="emergent"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
        </style>
    </head>
    <body>
        <!-- GitHub Pages SPA redirect restore: picks up the path saved by 404.html -->
        <script>
            (function(){
                var redir = sessionStorage.getItem('spa-redirect');
                if (redir) {
                    sessionStorage.removeItem('spa-redirect');
                    window.history.replaceState(null, '', redir);
                }
            })();
        </script>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script type="module" src="/src/index.jsx"></script>
    </body>
</html>
